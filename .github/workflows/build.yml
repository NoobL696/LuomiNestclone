name: Build and Release

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build and package Electron app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: frontend
        run: |
          pnpm run build
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and package Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: |
          pnpm run build
          npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and package Electron app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: frontend
        run: |
          pnpm run build
          npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        working-directory: frontend
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== release folder ==="
          ls -la release/ 2>/dev/null || echo "release not found"
          echo "=== release/dist folder ==="
          ls -la release/dist/ 2>/dev/null || echo "release/dist not found"
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: frontend/release/dist/**
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "=== Artifacts directory ==="
          ls -laR artifacts/ || echo "artifacts directory empty"
        shell: bash

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          echo "=== Flattened files ==="
          ls -la release-files/
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
